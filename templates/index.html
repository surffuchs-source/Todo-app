{% extends "base.html" %}
{% block title %}My Tasks — Taska{% endblock %}
{% block body %}
<header class="app-header">
  <div class="container">
    <div class="header-inner">
      <div class="app-logo">taska.</div>
      <div class="header-user">
        <span>{{ username }}</span>
        <a href="{{ url_for('logout') }}"><button class="btn btn-ghost">Sign out</button></a>
      </div>
    </div>
  </div>
</header>
<main class="main">
  <div class="container">
    <form class="add-form" action="{{ url_for('add_todo') }}" method="POST">
      <input class="add-input" type="text" name="title" placeholder="Add a new task..." required autocomplete="off">
      <button class="add-btn" type="submit">+</button>
    </form>
    <div class="todo-list">
      {% for todo in todos %}
      <div class="todo-item {% if todo['done'] %}done{% endif %}">
        <form class="todo-check-form" action="{{ url_for('toggle_todo', todo_id=todo['id']) }}" method="POST">
          <button class="todo-check" type="submit">{% if todo['done'] %}✓{% endif %}</button>
        </form>
        <span class="todo-title">{{ todo['title'] }}</span>
        <form action="{{ url_for('delete_todo', todo_id=todo['id']) }}" method="POST">
          <button class="btn-danger" type="submit">✕</button>
        </form>
      </div>
      {% endfor %}
      {% if not todos %}
      <div class="empty-state">
        <div class="empty-icon">✦</div>
        <p>Nothing here yet. Add your first task above.</p>
      </div>
      {% endif %}
    </div>
  </div>
</main>
{% endblock %}
