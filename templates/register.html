{% extends "base.html" %}
{% block title %}Create account — Taska{% endblock %}
{% block body %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">taska.</div>
    <div class="auth-tagline">Create your account to get started.</div>
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" placeholder="pick a username" required autofocus minlength="3">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="at least 6 characters" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary">Create account</button>
    </form>
    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
